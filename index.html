<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOKUTAZEMI</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  transition:background 0.5s ease, color 0.5s ease;
}

/* ■ 初期（黒） */
body.top{
  background:#000;
  color:#fff;
}

/* ■ スクロール後（白） */
body.scrolled{
  background:#f5f5f5;
  color:#000;
}

/* ■ ナビ固定（修正版） */
.nav{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  box-sizing:border-box;
  z-index:10000;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(6px);
}

/* ■ メニュー横並び */
.menu{
  display:flex;
  gap:15px;
}

/* ■ リンク共通 */
.nav a{
  color:inherit;
  text-decoration:none;
}

/* ■ メイン */
.hero{
  height:150vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* ■ フェード */
.transition{
  position:fixed;
  inset:0;
  background:#000;
  z-index:9999;
  pointer-events:none;
}
</style>
</head>

<body class="top">

<div class="transition"></div>

<!-- ■ ナビ -->
<div class="nav">
  <a href="./index.html">KOKUTAZEMI</a>

  <div class="menu">
    <a href="./information/">INFO</a>
    <a href="./about/">ABOUT</a>
    <a href="./contact/">CONTACT</a>
  </div>
</div>

<!-- ■ メイン -->
<section class="hero">
  <h1>SCROLL DOWN</h1>
</section>

<!-- ■ ダミースクロール -->
<section style="height:200vh;"></section>

<script>
/* ■ スクロールで背景変更 */
window.addEventListener("scroll", () => {
  document.body.classList.toggle("scrolled", window.scrollY > 100);
});

/* ■ 初期状態 */
document.body.classList.add("top");
</script>

</body>
</html>
